<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Netlify Forms registry</title>
</head>
<body>
  <!--
    Diese Datei wird Netlify nur zur Build-Zeit gescannt, damit die Forms
    in der Netlify-UI registriert sind. React-Formulare submit'ten via
    fetch() gegen genau diesen Pfad. Niemals direkt aufrufen.
  -->

  <form name="bewerbung" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="nickname" />
    <input type="text" name="alter" />
    <input type="text" name="spiele" />
    <input type="text" name="plattform" />
    <input type="text" name="erfahrung" />
    <input type="text" name="spielzeiten" />
    <textarea name="motivation"></textarea>
    <input type="text" name="discord" />
    <input type="text" name="bot-field" />
  </form>

  <form name="event-anmeldung" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="spiel" />
    <input type="text" name="clan" />
    <input type="number" name="spieler" />
    <textarea name="bemerkungen"></textarea>
    <input type="text" name="eventId" />
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
